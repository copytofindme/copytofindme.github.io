<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kwazemat Case</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --case-width: 150px; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- БЛОК ДОСТИЖЕНИЙ --- */
        .stats-wrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #222;
            width: 92%;
            max-width: 400px;
            margin-bottom: 15px;
            padding: 15px 15px 30px 15px; /* Снизу больше места под кнопку */
            transition: all 0.3s ease;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            border: 2px solid #2a2a2a;
            font-weight: bold;
            font-size: 18px;
            color: #3d3d3d;
            overflow: hidden;
            position: relative;
        }

        .stat-icon img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: none; 
        }
        
        /* Когда предмет разблокирован */
        .stat-item.unlocked .stat-icon img { display: block; }
        .stat-item.unlocked .stat-icon span { display: none; }
        
        /* ЦИФРЫ (СКРЫТЫ ПО УМОЛЧАНИЮ) */
        .stat-count {
            font-size: 13px;
            font-weight: 900;
            margin-top: 5px;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
            pointer-events: none;
        }

        /* Показываем числа при активации кнопки */
        .stats-wrapper.show-numbers .stat-count {
            opacity: 1;
            transform: translateY(0);
        }

        /* КНОПКА ПЕРЕКЛЮЧЕНИЯ (в указанном месте) */
        #stats-toggle-btn {
            position: absolute;
            bottom: 8px;
            right: 15px;
            font-size: 10px;
            color: #444;
            cursor: pointer;
            text-transform: lowercase;
            user-select: none;
            transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }
        #stats-toggle-btn:hover { color: #888; border-bottom-color: #555; }

        /* --- РУЛЕТКА --- */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
        }
        .pointer {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px; background: #ff4444;
            z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }
        .roulette-track { display: flex; position: absolute; left: 0; top: 25px; }
        .item { width: var(--case-width); height: 150px; flex-shrink: 0; display: flex; padding: 5px; box-sizing: border-box; }
        .item-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #222; border-radius: 8px; border: 1px solid #333;
            position: relative;
        }
        .item img { width: 80px; height: 80px; border-radius: 8px; margin-bottom: 5px; }
        .item-name { font-size: 11px; font-weight: bold; text-align: center; }
        .item-rarity { position: absolute; bottom: 8px; width: 80%; height: 4px; border-radius: 2px; }

        #spin-btn {
            padding: 15px 50px; background: #2aabee; color: white;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 15px; box-shadow: 0 4px 15px rgba(42, 171, 238, 0.2);
        }
        #spin-btn:active { transform: scale(0.98); }
        #spin-btn:disabled { background: #444; box-shadow: none; }

        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.96); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        #win-video { display: none; width: 240px; border-radius: 20px; border: 5px solid white; }
    </style>
</head>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kwazemat Case</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --case-width: 150px; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- БЛОК ДОСТИЖЕНИЙ --- */
        .stats-wrapper {
            position: relative;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #222;
            width: 90%;
            max-width: 380px;
            margin-bottom: 10px;
            padding: 12px 12px 25px 12px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-icon {
            width: 52px;
            height: 52px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            border: 2px solid #2a2a2a;
            font-weight: bold;
            font-size: 18px;
            color: #333;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .stat-icon img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        /* Разблокированные иконки */
        .stat-item.unlocked .stat-icon img { display: block; }
        .stat-item.unlocked .stat-icon span { display: none; }

        /* ЧИСЛА СТАТИСТИКИ (скрыты) */
        .stat-count {
            font-size: 12px;
            font-weight: 900;
            margin-top: 4px;
            opacity: 0; /* Невидимы по умолчанию */
            transition: opacity 0.3s ease;
        }
        .stats-wrapper.show-nums .stat-count { opacity: 1; }

        /* Кнопка "статистика" */
        #stats-toggle {
            position: absolute;
            bottom: 6px;
            right: 12px;
            font-size: 10px;
            color: #444;
            cursor: pointer;
            text-decoration: none;
            user-select: none;
        }

        /* --- РУЛЕТКА --- */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 180px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
            border-radius: 5px;
        }
        .pointer {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 3px; background: #ff4444;
            z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }
        .roulette-track { display: flex; position: absolute; left: 0; top: 15px; }
        .item { width: var(--case-width); height: 140px; flex-shrink: 0; display: flex; padding: 5px; box-sizing: border-box; }
        .item-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #222; border-radius: 8px; border: 1px solid #333;
            position: relative;
        }
        .item img { width: 70px; height: 70px; border-radius: 6px; margin-bottom: 5px; }
        .item-name { font-size: 10px; font-weight: bold; text-align: center; color: #ddd; }
        
        /* Полоска редкости */
        .item-rarity { position: absolute; bottom: 6px; width: 70%; height: 3px; border-radius: 2px; }

        #spin-btn {
            padding: 12px 40px; background: #2aabee; color: white;
            border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer;
            margin-top: 10px;
        }
        #spin-btn:disabled { background: #333; color: #666; }

        /* ОКНО ПОБЕДЫ */
        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        #win-video { display: none; width: 260px; border-radius: 15px; border: 4px solid; }
        #win-img { width: 240px; border-radius: 15px; border: 4px solid; }
    </style>
</head>
<body>

    <div class="stats-wrapper" id="stats-box">
        <div class="stats-grid" id="stats-grid"></div>
        <div id="stats-toggle">статистика</div>
    </div>

    <h2 style="margin: 5px 0; font-size: 18px;">Kwazemat Case</h2>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <button id="spin-btn">ОТКРЫТЬ КЕЙС</button>

    <div id="win-overlay" onclick="this.style.display='none'">
        <h1 id="win-rarity" style="margin-bottom: 10px;">ВЫПАЛО!</h1>
        <img id="win-img" src="">
        <video id="win-video" playsinline loop muted></video>
        <h2 id="win-name" style="margin-top: 15px;">Название</h2>
        <p style="color: #444; font-size: 12px;">нажми, чтобы закрыть</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        const characters = [
            { id: "amour", name: "Amour plastique", image: "https://i.ibb.co/s9cpgL5b/zxz.png", rarity: "Обычная", color: "#A0A0A0", weight: 35 },
            { id: "perdel", name: "Я НЕ ПЕРДЕЛ", image: "https://i.ibb.co/6RzPJ2PK/Picsart-26-03-19-17-28-57-544.jpg", rarity: "Редкая", color: "#3498DB", weight: 25 },
            { id: "logo", name: "Еврейское логово", image: "https://i.ibb.co/S49Wdtph/600-600.png", rarity: "Сверхредкая", color: "#3442db", weight: 20 },
            { id: "porn", name: "ПАРНУХА", image: "https://i.ibb.co/ZpSGBcvc/image.png", rarity: "Эпическая", color: "#9B59B6", weight: 10 },
            { id: "killer", name: "TURKISH KILLER", image: "https://i.ibb.co/Y7NcF17G/TURKISH-KILLER.png", rarity: "Мифическая", color: "#d61e1e", weight: 7 },
            { id: "jesus", name: "Иисус", image: "https://i.ibb.co/jdXbbr7/image.png", rarity: "Легендарная", color: "#F1C40F", weight: 3 },
            { 
                id: "secret", name: "АХнежка", 
                image: "https://i.ibb.co/ZR6ZQrtQ/secret.png",
                video: "secret_donotopen/secret.mp4",
                rarity: "INCREDIBLE GAZZY", color: "#008a19", weight: 1, isSecret: true 
            }
        ];

        let userStats = JSON.parse(localStorage.getItem('k_stats')) || {};

        // Переключатель цифр
        document.getElementById('stats-toggle').onclick = (e) => {
            e.stopPropagation();
            document.getElementById('stats-box').classList.toggle('show-nums');
        };

        function updateUI() {
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = '';
            characters.forEach(c => {
                const count = userStats[c.id] || 0;
                const unlocked = count > 0;
                const div = document.createElement('div');
                div.className = `stat-item ${unlocked ? 'unlocked' : ''}`;
                
                // Светлая обводка (добавляем прозрачность к основному цвету)
                const border = unlocked ? `border-color: ${c.color}; box-shadow: 0 0 10px ${c.color}44;` : '';

                div.innerHTML = `
                    <div class="stat-icon" style="${border}">
                        <span>${c.isSecret ? '???' : '?'}</span>
                        <img src="${c.image}">
                    </div>
                    <div class="stat-count" style="color: ${c.color}">${count}</div>
                `;
                grid.appendChild(div);
            });
        }

        function getWinner() {
            let total = characters.reduce((s, c) => s + c.weight, 0);
            let rnd = Math.random() * total;
            let sum = 0;
            for (let c of characters) {
                sum += c.weight;
                if (rnd <= sum) return c;
            }
            return characters[0];
        }

        function buildTrack(winChar) {
            const track = document.getElementById('track');
            track.innerHTML = '';
            for (let i = 0; i < 90; i++) {
                let c = (i === 75) ? winChar : characters[Math.floor(Math.random() * characters.length)];
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <div class="item-content">
                        <img src="${c.image}">
                        <div class="item-name">${c.name}</div>
                        <div class="item-rarity" style="background: ${c.color}"></div>
                    </div>
                `;
                track.appendChild(div);
            }
        }

        const tick = new Audio('opencase_tick_sound_volume+.mp3');
        const winSnd = new Audio('opencase_win_sound_volume+.mp3');

        document.getElementById('spin-btn').onclick = function() {
            const btn = this;
            btn.disabled = true;
            const winner = getWinner();
            buildTrack(winner);

            const track = document.getElementById('track');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            setTimeout(() => {
                const center = document.querySelector('.roulette-wrapper').offsetWidth / 2;
                const target = (75 * 150) + 75 - center + (Math.random() * 60 - 30);
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${target}px)`;

                // Звук тика
                let lastPos = 0;
                const interval = setInterval(() => {
                    let cur = Math.floor((Math.abs(track.getBoundingClientRect().left) + center) / 150);
                    if (cur !== lastPos) {
                        tick.currentTime = 0; tick.play().catch(()=>{});
                        lastPos = cur;
                    }
                }, 50);

                setTimeout(() => {
                    clearInterval(interval);
                    userStats[winner.id] = (userStats[winner.id] || 0) + 1;
                    localStorage.setItem('k_stats', JSON.stringify(userStats));
                    updateUI();

                    // Показ окна
                    const overlay = document.getElementById('win-overlay');
                    const v = document.getElementById('win-video');
                    const im = document.getElementById('win-img');
                    
                    if (winner.isSecret) {
                        im.style.display = 'none'; v.style.display = 'block';
                        v.src = winner.video; v.style.borderColor = winner.color;
                        v.play().catch(() => {});
                    } else {
                        v.style.display = 'none'; im.style.display = 'block';
                        im.src = winner.image; im.style.borderColor = winner.color;
                        winSnd.play().catch(()=>{});
                    }

                    document.getElementById('win-name').innerText = winner.name;
                    document.getElementById('win-rarity').innerText = winner.rarity;
                    document.getElementById('win-rarity').style.color = winner.color;
                    overlay.style.display = 'flex';
                    btn.disabled = false;
                }, 6200);
            }, 50);
        };

        updateUI();
        buildTrack(characters[0]);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kwazemat Case</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --case-width: 150px; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- СТАТИСТИКА (ТАБЛИЦА) --- */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 15px;
            border: 1px solid #333;
            margin-bottom: 10px;
            width: 90%;
            max-width: 400px;
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Стили иконки/заглушки */
        .stat-icon {
            width: 55px;
            height: 55px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #222;
            border: 2px solid #333;
            font-weight: bold;
            font-size: 20px;
            color: #444;
            overflow: hidden;
            transition: all 0.4s ease;
        }
        .stat-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none; /* Скрыто по дефолту */
        }
        /* Когда предмет разблокирован */
        .stat-item.unlocked .stat-icon img { display: block; }
        .stat-item.unlocked .stat-icon span { display: none; }
        
        .stat-count {
            font-size: 14px;
            font-weight: 900;
            margin-top: 5px;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        .stat-item.locked .stat-count { opacity: 0.3; color: white !important; }

        /* --- РУЛЕТКА --- */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            margin: 10px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .pointer {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px; background: #ff4444;
            z-index: 10; transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }
        .roulette-track {
            display: flex;
            position: absolute;
            left: 0; top: 25px;
            will-change: transform;
        }
        .item {
            width: var(--case-width);
            height: 150px;
            flex-shrink: 0;
            display: flex;
            padding: 5px;
            box-sizing: border-box;
        }
        .item-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #222; border-radius: 8px; border: 1px solid #333;
            position: relative;
        }
        .item img { width: 80px; height: 80px; border-radius: 8px; margin-bottom: 5px; }
        .item-name { font-size: 11px; font-weight: bold; text-align: center; padding: 0 5px; }
        
        /* ТА САМАЯ ПОЛОСКА */
        .item-rarity {
            position: absolute;
            bottom: 8px;
            width: 80%;
            height: 4px;
            border-radius: 2px;
        }

        #spin-btn {
            padding: 15px 50px;
            background: #2aabee; color: white;
            border: none; border-radius: 50px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(42, 171, 238, 0.3);
        }
        #spin-btn:disabled { background: #444; box-shadow: none; }

        #win-overlay {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.96); z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        #win-video { display: none; width: 240px; border-radius: 20px; border: 5px solid white; }
    </style>
</head>
<body>

    <div class="stats-grid" id="stats-container"></div>

    <h2 id="status-text" style="margin: 10px 0;">Kwazemat Case</h2>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <button id="spin-btn">ОТКРЫТЬ КЕЙС</button>

    <div id="win-overlay" onclick="closeOverlay()">
        <h1 id="win-rarity-text">ВЫПАЛО!</h1>
        <img id="win-img" src="" style="width: 240px; border-radius: 20px; border: 5px solid white;">
        <video id="win-video" playsinline loop muted preload="auto"></video>
        <h2 id="win-name">Название</h2>
        <p style="color: #888;">Нажми, чтобы продолжить</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const characters = [
            { id: "amour", name: "Amour plastique", image: "https://i.ibb.co/s9cpgL5b/zxz.png", rarity: "Обычная", color: "#A0A0A0", weight: 35 },
            { id: "perdel", name: "Я НЕ ПЕРДЕЛ", image: "https://i.ibb.co/6RzPJ2PK/Picsart-26-03-19-17-28-57-544.jpg", rarity: "Редкая", color: "#3498DB", weight: 25 },
            { id: "logo", name: "Еврейское логово", image: "https://i.ibb.co/S49Wdtph/600-600.png", rarity: "Сверхредкая", color: "#3442db", weight: 20 },
            { id: "porn", name: "ПАРНУХА", image: "https://i.ibb.co/ZpSGBcvc/image.png", rarity: "Эпическая", color: "#9B59B6", weight: 10 },
            { id: "killer", name: "TURKISH KILLER", image: "https://i.ibb.co/Y7NcF17G/TURKISH-KILLER.png", rarity: "Мифическая", color: "#d61e1e", weight: 7 },
            { id: "jesus", name: "Иисус", image: "https://i.ibb.co/jdXbbr7/image.png", rarity: "Легендарная", color: "#F1C40F", weight: 3 },
            { 
                id: "secret", name: "АХнежка", 
                image: "https://i.ibb.co/ZR6ZQrtQ/secret.png",
                video: "secret_donotopen/secret.mp4",
                rarity: "INCREDIBLE GAZZY", color: "#008a19", weight: 0.8, isSecret: true 
            }
        ];

        // --- ЛОГИКА СТАТИСТИКИ ---
        let userStats = JSON.parse(localStorage.getItem('kwazemat_stats')) || {};

        function updateStatsUI() {
            const container = document.getElementById('stats-container');
            container.innerHTML = '';
            characters.forEach(char => {
                const count = userStats[char.id] || 0;
                const isUnlocked = count > 0;
                const div = document.createElement('div');
                div.className = `stat-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                // Цвет обводки (чуть светлее оригинала)
                const lightColor = char.color + "AA"; // Добавляем прозрачность или можно использовать filter

                div.innerHTML = `
                    <div class="stat-icon" style="${isUnlocked ? `border-color: ${char.color}; box-shadow: 0 0 10px ${char.color}44;` : ''}">
                        <span>${char.isSecret ? '???' : '?'}</span>
                        <img src="${char.image}">
                    </div>
                    <div class="stat-count" style="color: ${char.color}">${count}</div>
                `;
                container.appendChild(div);
            });
        }

        function saveWin(charId) {
            userStats[charId] = (userStats[charId] || 0) + 1;
            localStorage.setItem('kwazemat_stats', JSON.stringify(userStats));
            updateStatsUI();
        }

        // --- РУЛЕТКА ---
        const tickPool = Array.from({ length: 15 }, () => new Audio('opencase_tick_sound_volume+.mp3'));
        let tickIndex = 0;
        const winSound = new Audio('opencase_win_sound_volume+.mp3');
        const secretSoundPath = 'secret_donotopen/re-zero-return-by-death.mp3';

        function playTick() {
            const sound = tickPool[tickIndex];
            sound.currentTime = 0;
            sound.play().catch(() => {});
            tickIndex = (tickIndex + 1) % tickPool.length;
        }

        function closeOverlay() {
            document.getElementById('win-overlay').style.display = 'none';
            const vid = document.getElementById('win-video');
            vid.pause(); vid.src = "";
        }

        function getRandomChar() {
            let total = characters.reduce((s, c) => s + c.weight, 0);
            let rnd = Math.random() * total;
            let sum = 0;
            for (let c of characters) {
                sum += c.weight;
                if (rnd <= sum) return c;
            }
        }

        function generateTrack(winner) {
            const track = document.getElementById('track');
            const winIndex = 75;
            track.innerHTML = '';
            for (let i = 0; i < 90; i++) {
                let char = (i === winIndex) ? winner : getRandomChar();
                const div = document.createElement('div');
                div.className = 'item';
                let glow = (char.weight <= 10 || char.isSecret) ? `box-shadow: inset 0 0 20px ${char.color}66; border-color: ${char.color};` : "";
                div.innerHTML = `
                    <div class="item-content" style="${glow}">
                        <img src="${char.image}">
                        <div class="item-name">${char.name}</div>
                        <div class="item-rarity" style="background: ${char.color}"></div>
                        <span style="display:none">${char.isSecret ? 'IS_SECRET' : ''}</span>
                    </div>
                `;
                track.appendChild(div);
            }
        }

        let isSpinning = false;
        document.getElementById('spin-btn').addEventListener('click', function() {
            if (isSpinning) return;
            const winner = getRandomChar();
            const winVid = document.getElementById('win-video');
            if (winner.isSecret) { winVid.src = winner.video; winVid.load(); }

            generateTrack(winner);
            isSpinning = true;
            this.disabled = true;
            const track = document.getElementById('track');
            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            
            setTimeout(() => {
                const center = document.querySelector('.roulette-wrapper').offsetWidth / 2;
                const stopPos = (75 * 150) + 75 - center + (Math.random() * 80 - 40);
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${stopPos}px)`;

                let lastTick = 0;
                const checkTick = () => {
                    if (!isSpinning) return;
                    const currentPos = Math.abs(track.getBoundingClientRect().left);
                    const currentIndex = Math.floor((currentPos + center) / 150);
                    if (currentIndex > lastTick) {
                        lastTick = currentIndex;
                        if (track.children[currentIndex]?.innerHTML.includes("IS_SECRET")) {
                            new Audio(secretSoundPath).play().catch(()=>{});
                        } else { playTick(); }
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                    }
                    requestAnimationFrame(checkTick);
                };
                checkTick();
            }, 100);

            setTimeout(() => {
                isSpinning = false;
                this.disabled = false;
                saveWin(winner.id); 

                const winImg = document.getElementById('win-img');
                const overlay = document.getElementById('win-overlay');

                if (winner.isSecret) {
                    winImg.style.display = 'none'; winVid.style.display = 'block';
                    winVid.muted = true; winVid.play().then(()=>winVid.muted=false).catch(()=>winVid.play());
                    winVid.style.borderColor = winner.color;
                } else {
                    winImg.style.display = 'block'; winVid.style.display = 'none';
                    winImg.src = winner.image; winImg.style.borderColor = winner.color;
                    winSound.play().catch(()=>{});
                }

                document.getElementById('win-name').innerText = winner.name;
                document.getElementById('win-rarity-text').innerText = winner.rarity;
                document.getElementById('win-rarity-text').style.color = winner.color;
                overlay.style.display = 'flex';
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 6200);
        });

        // Старт
        updateStatsUI();
        generateTrack(characters[0]);
    </script>
</body>
</html>

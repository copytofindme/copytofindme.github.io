<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kwazemat Case</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --case-width: 150px; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .stats-container {
            background: #1a1a1a;
            border-radius: 20px;
            border: 1px solid #333;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
            position: relative;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 35px;
        }
        .stat-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .stat-box {
            width: 55px;
            height: 55px;
            background: #222;
            border-radius: 12px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .stat-box .question-mark {
            display: block;
            font-size: 24px;
            font-weight: bold;
            color: #444;
        }
        .stat-box .question-mark.secret-placeholder {
            font-size: 18px;
        }
        .unlocked .stat-box .question-mark { display: none; }
        
        .stat-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .unlocked .stat-box img { display: block; }
        
        .stat-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .show-stats .unlocked .stat-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #toggle-stats-btn {
            position: absolute;
            bottom: 12px;
            right: 15px;
            background: #2a2a2a;
            color: #777;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            margin: 20px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ff4444;
            z-index: 10;
            transform: translateX(-50%);
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
        }
        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            top: 25px;
            will-change: transform;
        }
        .item {
            width: var(--case-width);
            height: 150px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            padding: 5px;
        }
        .item-content {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #222;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 5px;
        }
        .item-name {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            width: 90%;
            overflow: hidden;
        }
        .item-rarity {
            width: 80%;
            height: 4px;
            margin-top: 8px;
            border-radius: 2px;
        }
        #spin-btn {
            padding: 15px 50px;
            background: #2aabee;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #spin-btn:disabled { background: #444; }

        #win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        #win-img, #win-video {
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #win-overlay.active #win-img, 
        #win-overlay.active #win-video {
            transform: scale(1);
            opacity: 1;
        }

        #win-video {
            display: none;
            width: 220px;
            border-radius: 20px;
            border: 5px solid white;
            background: #000;
        }
    </style>
</head>
<body>

    <div class="stats-container" id="stats-container">
        <div class="stats-grid" id="stats-grid"></div>
        <button id="toggle-stats-btn">статистика</button>
    </div>

    <h2 id="status-text">Kwazemat Case</h2>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <button id="spin-btn">ОТКРЫТЬ КЕЙС</button>

    <div id="win-overlay" onclick="closeOverlay()">
        <h1 id="win-rarity-text">ВЫПАЛО!</h1>
        <img id="win-img" src="" style="width: 220px; border-radius: 20px; border: 5px solid white;">
        <video id="win-video" playsinline loop muted preload="auto"></video>
        <h2 id="win-name">Название</h2>
        <p>Нажми, чтобы закрыть</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        const tickPool = Array.from({ length: 15 }, () => new Audio('opencase_tick_sound_volume+.mp3'));
        let tickIndex = 0;
        
        const winSound = new Audio('opencase_win_sound_volume+.mp3');
        const epicSound = new Audio('epic_win.mp3');
        const mythicSound = new Audio('mythic_win.mp3');
        const legendarySound = new Audio('legendary_win.mp3');
        
        const secretSoundPath = 'secret_donotopen/re-zero-return-by-death.mp3';
        const secretSnd = new Audio(secretSoundPath);
        secretSnd.volume = 0.3;

        function playTick() {
            const sound = tickPool[tickIndex];
            sound.currentTime = 0;
            sound.play().catch(() => {});
            tickIndex = (tickIndex + 1) % tickPool.length;
        }

        function unlockAudio() {
            tickPool.forEach(s => { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(()=>{}); });
            [winSound, epicSound, mythicSound, legendarySound, secretSnd].forEach(s => {
                s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(()=>{});
            });
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchstart', unlockAudio);
        }
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);

        function closeOverlay() {
            const overlay = document.getElementById('win-overlay');
            overlay.classList.remove('active');
            setTimeout(() => {
                overlay.style.display = 'none';
                const vid = document.getElementById('win-video');
                vid.pause();
                vid.src = ""; 
            }, 300);
        }
        
        const characters = [
            { name: "Amour plastique", image: "https://i.ibb.co/s9cpgL5b/zxz.png", rarity: "Обычная", color: "#A0A0A0", weight: 35 },
            { name: "Я НЕ ПЕРДЕЛ", image: "https://i.ibb.co/6RzPJ2PK/Picsart-26-03-19-17-28-57-544.jpg", rarity: "Редкая", color: "#3498DB", weight: 25 },
            { name: "Еврейское логово", image: "https://i.ibb.co/S49Wdtph/600-600.png", rarity: "Сверхредкая", color: "#3442db", weight: 20 },
            { name: "ПАРНУХА", image: "https://i.ibb.co/ZpSGBcvc/image.png", rarity: "Эпическая", color: "#9B59B6", weight: 10 },
            { name: "TURKISH KILLER", image: "https://i.ibb.co/Y7NcF17G/TURKISH-KILLER.png", rarity: "Мифическая", color: "#d61e1e", weight: 7 },
            { name: "Иисус", image: "https://i.ibb.co/jdXbbr7/image.png", rarity: "Легендарная", color: "#F1C40F", weight: 3 },
            { 
                name: "АХнежка", 
                image: "https://i.ibb.co/ZR6ZQrtQ/secret.png",
                video: "secret_donotopen/secret.mp4",
                rarity: "INCREDIBLE GAZZY", 
                color: "#008a19", 
                weight: 0.8, 
                isSecret: true 
            }
        ];

        let stats = JSON.parse(localStorage.getItem('kz_stats_final_v3')) || {};

        function updateStatsUI() {
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = '';
            characters.forEach(c => {
                const count = stats[c.name] || 0;
                const slot = document.createElement('div');
                slot.className = `stat-slot ${count > 0 ? 'unlocked' : 'locked'}`;
                
                let placeholderText = '?';
                let placeholderClass = 'question-mark';
                if (c.isSecret) {
                    placeholderText = '???';
                    placeholderClass += ' secret-placeholder';
                }

                slot.innerHTML = `
                    <div class="stat-box" style="${count > 0 ? 'border-color:'+c.color : ''}">
                        <span class="${placeholderClass}">${placeholderText}</span>
                        <img src="${c.image}">
                        <div class="stat-overlay" style="background: ${c.color}99; border: 1px solid ${c.color}; color: #121212;">
                            ${count}
                        </div>
                    </div>
                `;
                grid.appendChild(slot);
            });
        }

        document.getElementById('toggle-stats-btn').addEventListener('click', () => {
            document.getElementById('stats-container').classList.toggle('show-stats');
        });
        
        updateStatsUI();

        const track = document.getElementById('track');
        const btn = document.getElementById('spin-btn');
        const caseWidth = 150;
        const winIndex = 75;

        function getRandomChar() {
            let total = characters.reduce((s, c) => s + c.weight, 0);
            let rnd = Math.random() * total;
            let sum = 0;
            for (let c of characters) {
                sum += c.weight;
                if (rnd <= sum) return c;
            }
        }

        function getVisualChar() {
            const visualChars = characters.map(c => ({
                ...c,
                weight: c.isSecret ? c.weight / 10 : c.weight
            }));
            let total = visualChars.reduce((s, c) => s + c.weight, 0);
            let rnd = Math.random() * total;
            let sum = 0;
            for (let c of visualChars) {
                sum += c.weight;
                if (rnd <= sum) return c;
            }
        }

        function generateTrack(winner) {
            track.innerHTML = '';
            for (let i = 0; i < 90; i++) {
                let char = (i === winIndex) ? winner : getVisualChar();
                const div = document.createElement('div');
                div.className = 'item';
                let glow = (char.weight <= 10 || char.isSecret) ? `box-shadow: inset 0 0 20px ${char.color}; border-color: ${char.color};` : "";
                div.innerHTML = `
                    <div class="item-content" style="${glow}">
                        <img src="${char.image}">
                        <div class="item-name">${char.name}</div>
                        <span style="display:none">${char.isSecret ? 'IS_SECRET' : ''}</span>
                        <div class="item-rarity" style="background: ${char.color}"></div>
                    </div>
                `;
                track.appendChild(div);
            }
        }

        let isSpinning = false;

        btn.addEventListener('click', () => {
            if (isSpinning) return;
            
            [winSound, epicSound, mythicSound, legendarySound, secretSnd].forEach(s => {
                const oldVol = s.volume;
                s.volume = 0;
                s.play().then(() => { s.pause(); s.currentTime = 0; s.volume = oldVol; }).catch(()=>{});
            });

            const winner = getRandomChar();
            
            const winVid = document.getElementById('win-video');
            if (winner.isSecret) {
                winVid.src = winner.video;
                winVid.load();
            }

            generateTrack(winner);
            isSpinning = true;
            btn.disabled = true;
            track.style.transition = 'none';
            track.style.transform = 'translateX(0px)';
            
            setTimeout(() => {
                const center = document.querySelector('.roulette-wrapper').offsetWidth / 2;
                const randomShift = Math.floor(Math.random() * 80) - 40;
                const stopPos = (winIndex * caseWidth) + (caseWidth / 2) - center + randomShift;
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${stopPos}px)`;

                let lastTick = 0;
                const checkTick = () => {
                    if (!isSpinning) return;
                    const currentPos = Math.abs(track.getBoundingClientRect().left);
                    const currentIndex = Math.floor((currentPos + center) / caseWidth);
                    if (currentIndex > lastTick) {
                        lastTick = currentIndex;
                        const passingItem = track.children[currentIndex];
                        if (passingItem && passingItem.innerHTML.includes("IS_SECRET")) {
                            const tempSecret = new Audio(secretSoundPath);
                            tempSecret.volume = 0.3;
                            tempSecret.play().catch(()=>{});
                            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
                        } else {
                            playTick();
                            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                        }
                    }
                    requestAnimationFrame(checkTick);
                };
                checkTick();
            }, 100);

            setTimeout(() => {
                isSpinning = false;
                btn.disabled = false;
                
                stats[winner.name] = (stats[winner.name] || 0) + 1;
                localStorage.setItem('kz_stats_final_v3', JSON.stringify(stats));
                updateStatsUI();
                
                const winImg = document.getElementById('win-img');
                const overlay = document.getElementById('win-overlay');

                if (winner.isSecret) {
                    winImg.style.display = 'none';
                    winVid.style.display = 'block';
                    winVid.style.borderColor = winner.color;
                    winVid.muted = true; 
                    winVid.play().then(() => { winVid.muted = false; }).catch(() => { winVid.play(); });
                } else {
                    winImg.style.display = 'block';
                    winVid.style.display = 'none';
                    winImg.src = winner.image;
                    winImg.style.borderColor = winner.color;
                    
                    let targetSound = winSound;
                    if (winner.rarity === "Эпическая") targetSound = epicSound;
                    if (winner.rarity === "Мифическая") targetSound = mythicSound;
                    if (winner.rarity === "Легендарная") targetSound = legendarySound;
                    
                    targetSound.currentTime = 0;
                    targetSound.play().catch(()=>{});
                }

                document.getElementById('win-name').innerText = winner.name;
                document.getElementById('win-rarity-text').innerText = winner.rarity;
                document.getElementById('win-rarity-text').style.color = winner.color;
                
                overlay.style.display = 'flex';
                setTimeout(() => {
                    overlay.classList.add('active');
                }, 10);
                
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 6200);
        });

        generateTrack(characters[0]);
    </script>
</body>
</html>

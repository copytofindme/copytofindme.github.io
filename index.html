<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Кейсы Кваземата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --case-width: 150px;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Окно рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 200px;
            margin: 20px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden; /* Прячем лишние кейсы */
        }

        /* Центральная линия-указатель */
        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #ff4444;
            z-index: 10;
            box-shadow: 0 0 10px rgba(255,68,68,0.5);
            transform: translateX(-50%);
        }

        /* Лента с предметами */
        .roulette-track {
            display: flex;
            position: absolute;
            left: 0;
            top: 25px;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); /* Плавное замедление как в CS */
            will-change: transform;
        }

        /* Карточка предмета */
        .item {
            width: var(--case-width);
            height: 150px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid #222;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            box-sizing: border-box;
            padding: 10px;
        }

        .item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .item-name {
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .item-rarity {
            width: 100%;
            height: 4px;
            margin-top: 8px;
            border-radius: 2px;
        }

        /* Кнопка */
        #spin-btn {
            padding: 15px 50px;
            background: #2aabee;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(42,171,238,0.3);
        }

        #spin-btn:disabled { background: #444; cursor: not-allowed; }

        /* Финальное окно */
        #win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h2 id="status-text">Кейс Кваземата</h2>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <button id="spin-btn">ОТКРЫТЬ КЕЙС</button>

    <div id="win-overlay" onclick="this.style.display='none'">
        <h1 id="win-rarity-text">ВЫПАЛО!</h1>
        <img id="win-img" src="" style="width: 200px; border-radius: 20px; border: 5px solid white;">
        <h2 id="win-name">Название</h2>
        <p>Нажми куда угодно, чтобы закрыть</p>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const tickSound = new Audio('https://www.soundjay.com/buttons/button-50.mp3');
    const winSound = new Audio('https://www.soundjay.com/buttons/button-10.mp3');

    const characters = [
        { name: "Amour plastique", image: "https://i.ibb.co/s9cpgL5b/zxz.png", rarity: "Обычная", color: "#A0A0A0", weight: 40 },
        { name: "Я НЕ", image: "https://i.ibb.co/6RzPJ2PK/Picsart-26-03-19-17-28-57-544.jpg", rarity: "Редкая", color: "#3498DB", weight: 25 },
        { name: "КОРОЛЬ", image: "https://i.ibb.co/888888/king.png", rarity: "Сверхредкая", color: "#3442db", weight: 20 },
        { name: "ПАРНУХА", image: "https://i.ibb.co/ZpSGBcvc/image.png", rarity: "Эпическая", color: "#9B59B6", weight: 10 },
        { name: "СЕКРЕТНЫЙ КВАЗ", image: "https://placehold.co/400x400/gold/black?text=Легенда", rarity: "Легендарная", color: "#F1C40F", weight: 5 }
    ];

    const track = document.getElementById('track');
    const btn = document.getElementById('spin-btn');
    const caseWidth = 150; // Ширина одного кейса в CSS
    const winIndex = 75;   // На какой по счету карточке остановимся

    function getRandomChar() {
        let total = characters.reduce((s, c) => s + c.weight, 0);
        let rnd = Math.random() * total;
        let sum = 0;
        for (let c of characters) {
            sum += c.weight;
            if (rnd <= sum) return c;
        }
    }

    function generateTrack(winner) {
        track.innerHTML = '';
        for (let i = 0; i < 85; i++) {
            // Если это индекс победы, ставим нашего победителя, иначе — рандом
            const char = (i === winIndex) ? winner : characters[Math.floor(Math.random() * characters.length)];
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
                <img src="${char.image}">
                <div class="item-name">${char.name}</div>
                <div class="item-rarity" style="background: ${char.color}"></div>
            `;
            track.appendChild(div);
        }
    }

    let isSpinning = false;

    btn.addEventListener('click', () => {
        if (isSpinning) return;
        
        const winner = getRandomChar(); // 1. Выбираем победителя сразу
        generateTrack(winner);         // 2. Строим ленту, где этот победитель на 75-м месте
        
        isSpinning = true;
        btn.disabled = true;
        document.getElementById('status-text').innerText = "Открываем...";

        // Сброс позиции ленты
        track.style.transition = 'none';
        track.style.transform = 'translateX(0px)';
        
        setTimeout(() => {
            // 3. Рассчитываем точную остановку
            const containerWidth = document.querySelector('.roulette-wrapper').offsetWidth;
            const center = containerWidth / 2;
            // Добавляем небольшой рандомный сдвиг внутри карточки, чтобы не всегда ровно по центру стрелки
            const randomOffset = Math.floor(Math.random() * 60) - 30; 
            const stopPos = (winIndex * caseWidth) + (caseWidth / 2) - center + randomOffset;
            
            track.style.transition = 'transform 5s cubic-bezier(0.15, 0, 0.1, 1)';
            track.style.transform = `translateX(-${stopPos}px)`;

            // Звук тиканья при проезде каждой карточки
            let lastTick = 0;
            const checkTick = () => {
                const currentPos = Math.abs(track.getBoundingClientRect().left);
                const currentIndex = Math.floor((currentPos + center) / caseWidth);
                if (currentIndex > lastTick) {
                    lastTick = currentIndex;
                    tickSound.currentTime = 0;
                    tickSound.play().catch(()=>{});
                    if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                }
                if (isSpinning) requestAnimationFrame(checkTick);
            };
            checkTick();
        }, 100);

        setTimeout(() => {
            isSpinning = false;
            btn.disabled = false;
            document.getElementById('status-text').innerText = "Кейс Кваземата";
            
            // Показываем финал
            document.getElementById('win-img').src = winner.image;
            document.getElementById('win-name').innerText = winner.name;
            document.getElementById('win-rarity-text').innerText = winner.rarity;
            document.getElementById('win-rarity-text').style.color = winner.color;
            document.getElementById('win-overlay').style.display = 'flex';
            
            winSound.play().catch(()=>{});
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        }, 5200);
    });

    // Начальная пустая лента
    generateTrack(characters[0]);
</script>
</body>
</html>

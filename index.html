<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kwazemat Case</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --case-width: 150px; }
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- БЛОК СТАТИСТИКИ --- */
        .stats-container {
            background: #1a1a1a;
            border-radius: 20px;
            border: 1px solid #333;
            padding: 15px;
            width: 90%;
            max-width: 400px;
            margin-bottom: 20px;
            position: relative;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 35px; /* Место под кнопку */
        }
        .stat-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .stat-box {
            width: 55px;
            height: 55px;
            background: #222;
            border-radius: 12px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .stat-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .unlocked .stat-box img { display: block; }
        
        /* КУБИК СТАТИСТИКИ ПОВЕРХ КАРТИНКИ */
        .stat-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        .show-stats .unlocked .stat-overlay {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #toggle-stats-btn {
            position: absolute;
            bottom: 12px;
            right: 15px;
            background: #2a2a2a;
            color: #777;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* --- РУЛЕТКА --- */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 180px;
            margin: 15px 0;
            background: #1a1a1a;
            border: 2px solid #333;
            overflow: hidden;
        }
        .pointer {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 4px; background: #ff4444;
            z-index: 10; transform: translateX(-50%);
        }
        .roulette-track { display: flex; position: absolute; left: 0; top: 15px; }
        .item { width: var(--case-width); height: 140px; flex-shrink: 0; display: flex; padding: 5px; box-sizing: border-box; }
        .item-content {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #222; border-radius: 8px; border: 1px solid #333;
        }
        .item img { width: 70px; height: 70px; border-radius: 8px; margin-bottom: 5px; }
        .item-name { font-size: 10px; font-weight: bold; text-align: center; }
        .item-rarity { width: 80%; height: 3px; margin-top: 5px; border-radius: 2px; }

        #spin-btn {
            padding: 15px 60px; background: #2aabee; color: white;
            border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 10px; box-shadow: 0 4px 15px rgba(42, 171, 238, 0.3);
        }

        #win-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97); z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        #win-img { width: 220px; border-radius: 20px; border: 5px solid; }
        #win-video { display: none; width: 220px; border-radius: 20px; border: 5px solid; }
    </style>
</head>
<body>

    <div class="stats-container" id="stats-container">
        <div class="stats-grid" id="stats-grid"></div>
        <button id="toggle-stats-btn">статистика</button>
    </div>

    <h2 style="font-size: 20px; margin: 5px 0;">Kwazemat Case</h2>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div class="roulette-track" id="track"></div>
    </div>

    <button id="spin-btn">ОТКРЫТЬ КЕЙС</button>

    <div id="win-overlay" onclick="closeOverlay()">
        <h1 id="win-rarity-text">ВЫПАЛО!</h1>
        <img id="win-img" src="">
        <video id="win-video" playsinline loop muted></video>
        <h2 id="win-name" style="margin-top: 15px;">Название</h2>
        <p style="color: #666; font-size: 12px;">Нажми, чтобы закрыть</p>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // --- ДАННЫЕ ---
        const characters = [
            { id: "amour", name: "Amour plastique", image: "https://i.ibb.co/s9cpgL5b/zxz.png", rarity: "Обычная", color: "#A0A0A0", weight: 35 },
            { id: "perdel", name: "Я НЕ ПЕРДЕЛ", image: "https://i.ibb.co/6RzPJ2PK/Picsart-26-03-19-17-28-57-544.jpg", rarity: "Редкая", color: "#3498DB", weight: 25 },
            { id: "logo", name: "Еврейское логово", image: "https://i.ibb.co/S49Wdtph/600-600.png", rarity: "Сверхредкая", color: "#3442db", weight: 20 },
            { id: "porn", name: "ПАРНУХА", image: "https://i.ibb.co/ZpSGBcvc/image.png", rarity: "Эпическая", color: "#9B59B6", weight: 10 },
            { id: "killer", name: "TURKISH KILLER", image: "https://i.ibb.co/Y7NcF17G/TURKISH-KILLER.png", rarity: "Мифическая", color: "#d61e1e", weight: 7 },
            { id: "jesus", name: "Иисус", image: "https://i.ibb.co/jdXbbr7/image.png", rarity: "Легендарная", color: "#F1C40F", weight: 3 },
            { 
                id: "secret", name: "АХнежка", 
                image: "https://i.ibb.co/ZR6ZQrtQ/secret.png",
                video: "secret_donotopen/secret.mp4",
                rarity: "INCREDIBLE GAZZY", color: "#008a19", weight: 0.8, isSecret: true 
            }
        ];

        let stats = JSON.parse(localStorage.getItem('kz_stats')) || {};

        // --- ПУЛ ЗВУКОВ (ИСПРАВЛЕНИЕ ДЛЯ ТЕЛЕФОНОВ) ---
        const tickPool = Array.from({ length: 15 }, () => new Audio('opencase_tick_sound_volume+.mp3'));
        let tickIndex = 0;
        const winSnd = new Audio('opencase_win_sound_volume+.mp3');
        const secretSnd = new Audio('secret_donotopen/re-zero-return-by-death.mp3');

        function playTick() {
            const sound = tickPool[tickIndex];
            sound.currentTime = 0;
            sound.play().catch(() => {});
            tickIndex = (tickIndex + 1) % tickPool.length;
        }

        // Разблокировка аудио при первом касании (для мобилок)
        function initAudio() {
            tickPool.forEach(s => { s.play().then(() => { s.pause(); s.currentTime = 0; }).catch(()=>{}); });
            winSnd.play().then(() => { winSnd.pause(); winSnd.currentTime = 0; }).catch(()=>{});
            secretSnd.play().then(() => { secretSnd.pause(); secretSnd.currentTime = 0; }).catch(()=>{});
            document.removeEventListener('click', initAudio);
            document.removeEventListener('touchstart', initAudio);
        }
        document.addEventListener('click', initAudio);
        document.addEventListener('touchstart', initAudio);

        // --- СТАТИСТИКА ---
        function updateStatsUI() {
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = '';
            characters.forEach(c => {
                const count = stats[c.id] || 0;
                const slot = document.createElement('div');
                slot.className = `stat-slot ${count > 0 ? 'unlocked' : 'locked'}`;

                slot.innerHTML = `
                    <div class="stat-box" style="${count > 0 ? 'border-color:'+c.color : ''}">
                        <img src="${c.image}">
                        <div class="stat-overlay" style="background: ${c.color}99; border: 1px solid ${c.color}; color: #121212;">
                            ${count}
                        </div>
                    </div>
                `;
                grid.appendChild(slot);
            });
        }

        document.getElementById('toggle-stats-btn').onclick = () => {
            document.getElementById('stats-container').classList.toggle('show-stats');
        };

        // --- РУЛЕТКА ---
        const track = document.getElementById('track');
        const btn = document.getElementById('spin-btn');
        const caseWidth = 150;

        function generateTrack(winner) {
            track.innerHTML = '';
            for (let i = 0; i < 90; i++) {
                let c = (i === 75) ? winner : characters[Math.floor(Math.random() * characters.length)];
                const div = document.createElement('div');
                div.className = 'item';
                let glow = (c.weight <= 10 || c.isSecret) ? `box-shadow: inset 0 0 15px ${c.color}66; border-color: ${c.color};` : "";
                div.innerHTML = `
                    <div class="item-content" style="${glow}">
                        <img src="${c.image}">
                        <div class="item-name">${c.name}</div>
                        <div class="item-rarity" style="background: ${c.color}"></div>
                    </div>
                `;
                track.appendChild(div);
            }
        }

        let isSpinning = false;
        btn.onclick = () => {
            if (isSpinning) return;
            
            function getRealWinner() {
                let total = characters.reduce((s, c) => s + c.weight, 0);
                let rnd = Math.random() * total;
                let sum = 0;
                for (let c of characters) { sum += c.weight; if (rnd <= sum) return c; }
            }
            const realWinner = getRealWinner();

            generateTrack(realWinner);
            isSpinning = true;
            btn.disabled = true;
            track.style.transition = 'none';
            track.style.transform = 'translateX(0)';

            setTimeout(() => {
                const center = document.querySelector('.roulette-wrapper').offsetWidth / 2;
                const stopPos = (75 * caseWidth) + (caseWidth / 2) - center + (Math.random() * 60 - 30);
                track.style.transition = 'transform 6s cubic-bezier(0.1, 0, 0.1, 1)';
                track.style.transform = `translateX(-${stopPos}px)`;

                // Отслеживание тиков через requestAnimationFrame (самый плавный способ)
                let lastTick = 0;
                const checkTick = () => {
                    if (!isSpinning) return;
                    const currentPos = Math.abs(track.getBoundingClientRect().left);
                    const currentIndex = Math.floor((currentPos + center) / caseWidth);
                    if (currentIndex > lastTick) {
                        lastTick = currentIndex;
                        playTick();
                        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
                    }
                    requestAnimationFrame(checkTick);
                };
                requestAnimationFrame(checkTick);

                setTimeout(() => {
                    isSpinning = false; btn.disabled = false;
                    
                    stats[realWinner.id] = (stats[realWinner.id] || 0) + 1;
                    localStorage.setItem('kz_stats', JSON.stringify(stats));
                    updateStatsUI();

                    const overlay = document.getElementById('win-overlay');
                    const wImg = document.getElementById('win-img');
                    const wVid = document.getElementById('win-video');

                    if (realWinner.isSecret) {
                        wImg.style.display = 'none'; wVid.style.display = 'block';
                        wVid.src = realWinner.video; wVid.style.borderColor = realWinner.color;
                        wVid.play(); secretSnd.play().catch(()=>{});
                    } else {
                        wVid.style.display = 'none'; wImg.style.display = 'block';
                        wImg.src = realWinner.image; wImg.style.borderColor = realWinner.color;
                        winSnd.play().catch(()=>{});
                    }

                    document.getElementById('win-name').innerText = realWinner.name;
                    document.getElementById('win-rarity-text').innerText = realWinner.rarity;
                    document.getElementById('win-rarity-text').style.color = realWinner.color;
                    overlay.style.display = 'flex';
                    if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
                }, 6200);
            }, 50);
        };

        function closeOverlay() {
            document.getElementById('win-overlay').style.display = 'none';
            document.getElementById('win-video').pause();
        }

        updateStatsUI();
        generateTrack(characters[0]);
    </script>
</body>
</html>

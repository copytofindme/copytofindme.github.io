<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Mini App</title>
    <script    src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: 
            var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 15px 25px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1 id="greeting">Привет!</h1>
    <p>Это твое первое Mini App окно.</p>
    
    <button id="main-btn">Нажми на меня</button>

    <script>
        const tg = window.Telegram.WebApp;

        tg.expand();
     
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('greeting').innerText = Привет, ${user.first_name}!;
        }       document.getElementById('main-btn').addEventListener('click', () => {
            tg.showAlert("Ты нажал на кнопку внутри Telegram!");
           (Haptic Feedback)
      tg.HapticFeedback.impactOccurred('medium');
        });
    </script>
</body>
</html>

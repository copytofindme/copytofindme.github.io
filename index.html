<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рулетка Кваземата</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #1e1e1e);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        #result-card {
            display: none;
            margin-bottom: 20px;
        }

        #char-image {
            width: 200px;
            height: 200px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            transition: transform 0.1s;
        }

        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #char-name {
            font-size: 24px;
            font-weight: bold;
            margin: 5px 0;
        }

        #char-rarity {
            font-size: 18px;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button {
            padding: 15px 40px;
            background-color: var(--tg-theme-button-color, #2aabee);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
            transition: all 0.1s;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        button:disabled {
            background-color: #555555;
            color: #aaaaaa;
            cursor: not-allowed;
            transform: translateY(4px);
            box-shadow: none;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1 id="title">Кто ты из Кваземата?</h1>

    <div id="result-card">
        <img id="char-image" src="" alt="Персонаж">
        <div id="char-name">Имя</div>
        <div id="char-rarity">Редкость</div>
    </div>
    
    <button id="spin-btn">Испытать удачу!</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const characters = [
            { name: "Amour plastique", image: "https://i.ibb.co/FL4G9CYS/z.png", rarity: "Обычная", color: "#A0A0A0", weight: 60 },
            { name: "Четкий пацан", image: "https://placehold.co/400x400/blue/white?text=Пацан", rarity: "Редкая", color: "#3498DB", weight: 25 },
            { name: "Босс Кваземата", image: "https://placehold.co/400x400/purple/white?text=Босс", rarity: "Эпическая", color: "#9B59B6", weight: 10 },
            { name: "СЕКРЕТНЫЙ КВАЗ", image: "https://placehold.co/400x400/gold/black?text=Легенда", rarity: "Легендарная", color: "#F1C40F", weight: 5 }
        ];

        function getRandomCharacter() {
            let totalWeight = characters.reduce((sum, char) => sum + char.weight, 0);
            let randomNum = Math.random() * totalWeight;
            let weightSum = 0;
            for (let i = 0; i < characters.length; i++) {
                weightSum += characters[i].weight;
                if (randomNum <= weightSum) return characters[i];
            }
        }

        let isSpinning = false;

        document.getElementById('spin-btn').addEventListener('click', () => {
            if (isSpinning) return;
            
            isSpinning = true;
            const btn = document.getElementById('spin-btn');
            btn.disabled = true; 
            btn.innerText = "Крутим...";

            document.getElementById('title').style.display = 'none';
            const card = document.getElementById('result-card');
            const img = document.getElementById('char-image');
            
            card.style.display = 'block';
            img.classList.remove('pop-in'); 

            let spinCount = 0;
            const maxSpins = 20; 
            const spinSpeed = 100;

            const spinInterval = setInterval(() => {
                const randomVisual = characters[Math.floor(Math.random() * characters.length)];
                
                img.src = randomVisual.image;
                document.getElementById('char-name').innerText = "???";
                document.getElementById('char-rarity').innerText = "Выбираем...";
                document.getElementById('char-rarity').style.color = "var(--tg-theme-text-color, #ffffff)";

                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }

                spinCount++;

                if (spinCount >= maxSpins) {
                    clearInterval(spinInterval); 
                    
                    const finalResult = getRandomCharacter();
                    
                    img.src = finalResult.image;
                    document.getElementById('char-name').innerText = finalResult.name;
                    
                    const rarityElement = document.getElementById('char-rarity');
                    rarityElement.innerText = finalResult.rarity;
                    rarityElement.style.color = finalResult.color;

                    img.classList.add('pop-in');

                    if (tg.HapticFeedback) {
                        tg.HapticFeedback.notificationOccurred('success');
                    }

                    isSpinning = false;
                    btn.disabled = false;
                    btn.innerText = "Крутить еще раз!";
                }
            }, spinSpeed);
        });
    </script>
</body>
</html>
